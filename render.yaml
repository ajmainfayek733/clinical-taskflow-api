databases:
  - name: taskflow-db
    plan: free
    databaseName: taskflow
    user: taskflow

services:
  - type: web
    name: taskflow-backend
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: python -m gunicorn config.asgi:application -k uvicorn.workers.UvicornWorker
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: taskflow-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
